// ── Meditation Timer ───────────────────────────────────────────────────
function MeditationTimer(){
  const [secs,setSecs]=useState(300);
  const [running,setRunning]=useState(false);
  const [soundOn,setSoundOn]=useState(true);
  const synthRef=useRef(null);
  const loopRef=useRef(null);

  const startSound=async()=>{
    try{
      await Tone.start();
      const rev=new Tone.Reverb({decay:6,wet:0.8}).toDestination();
      synthRef.current=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},envelope:{attack:2,decay:1,sustain:0.6,release:4},volume:-18}).connect(rev);
      const notes=['C4','E4','G4','A4','C5'];let i=0;
      loopRef.current=new Tone.Loop(t=>{synthRef.current.triggerAttackRelease(notes[i++%notes.length],'2n',t)},'2n');
      Tone.getTransport().bpm.value=40;loopRef.current.start(0);Tone.getTransport().start();
    }catch(e){console.log('Sound error:',e)}
  };
  const stopSound=()=>{try{loopRef.current&&loopRef.current.stop();Tone.getTransport().stop();synthRef.current&&synthRef.current.releaseAll();}catch(e){}};

  useEffect(()=>{if(running&&soundOn)startSound();else stopSound();return stopSound},[running,soundOn]);
  useEffect(()=>{
    if(!running)return;
    if(secs<=0){setRunning(false);stopSound();return;}
    const id=setTimeout(()=>setSecs(s=>s-1),1000);return()=>clearTimeout(id);
  },[running,secs]);

  const r=64,circ=2*Math.PI*r,offset=circ*(1-secs/300);
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  return e('div',{style:{borderRadius:24,padding:20,background:'#FBEDEE'}},
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
      e('p',{style:{fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:C.rose}},'Restore · Wellness'),
      e('button',{onClick:()=>setSoundOn(s=>!s),style:{background:soundOn?C.bordeaux:'#ffffffaa',color:soundOn?'white':C.sub,border:'none',borderRadius:9999,padding:'4px 10px',fontSize:11,cursor:'pointer'}},soundOn?'🔊 Sound on':'🔇 Sound off')
    ),
    e('h2',{className:'font-display',style:{fontSize:18,color:C.ink}},'5-Minute Guided Meditation'),
    e('p',{style:{fontSize:12,color:C.sub,margin:'4px 0 16px'}},'Find a comfortable seat. Soften your shoulders. Let your breath lead.'),
    e('div',{style:{display:'flex',justifyContent:'center',margin:'8px 0'}},
      e('div',{style:{position:'relative',width:160,height:160}},
        e('svg',{width:160,height:160,viewBox:'0 0 160 160'},
          e('circle',{cx:80,cy:80,r:r,fill:'none',stroke:'#ffffffaa',strokeWidth:8}),
          e('circle',{cx:80,cy:80,r:r,fill:'none',stroke:C.bordeaux,strokeWidth:8,strokeLinecap:'round',strokeDasharray:circ,strokeDashoffset:offset,transform:'rotate(-90 80 80)',style:{transition:'stroke-dashoffset 1s linear'}})
        ),
        e('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
          e('span',{className:'font-display',style:{fontSize:28,color:C.ink}},fmt(secs)),
          running&&soundOn&&e('span',{style:{fontSize:10,color:C.rose,letterSpacing:'0.2em'}},'♪ playing')
        )
      )
    ),
    e('div',{style:{display:'flex',justifyContent:'center',gap:12,marginTop:12}},
      e('button',{onClick:()=>{setRunning(false);stopSound();setSecs(300)},style:{width:44,height:44,borderRadius:'50%',background:'#ffffffaa',border:'none',cursor:'pointer',fontSize:18}},'↺'),
      e('button',{onClick:()=>secs>0&&setRunning(r=>!r),style:{width:56,height:56,borderRadius:'50%',background:C.bordeaux,color:'white',border:'none',cursor:'pointer',fontSize:22}},running?'⏸':'▶'),
      e('div',{style:{width:44}})
    ),
    secs===0&&e('p',{style:{textAlign:'center',fontSize:14,fontWeight:600,color:C.bordeaux,marginTop:16}},'Beautifully done. Take a slow breath before you go.')
  );
}

// ── Journal ────────────────────────────────────────────────────────────
function Journal(){
  const [entry,setEntry]=useState('');
  const [entries,setEntries]=useState([]);
  const [saved,setSaved]=useState(false);

  useEffect(()=>{try{const s=localStorage.getItem('aurinne-journal');if(s)setEntries(JSON.parse(s));}catch(e){};},[]);

  const save=()=>{
    if(!entry.trim())return;
    const updated=[{text:entry.trim(),date:new Date().toISOString()},...entries].slice(0,50);
    setEntries(updated);
    try{localStorage.setItem('aurinne-journal',JSON.stringify(updated));}catch(e){}
    setEntry('');setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const fmt=iso=>{const d=new Date(iso);return d.toLocaleDateString(undefined,{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})};

  return e('div',{style:{borderRadius:24,padding:20,background:'#F6E3DF'}},
    e('p',{style:{fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:C.bordeaux}},'Move · Reformer'),
    e('h2',{className:'font-display',style:{fontSize:18,color:C.ink}},'Daily Journal'),
    e('p',{style:{fontSize:12,color:C.sub,margin:'4px 0 12px'}},'Write freely about your practice, your body, your day.'),
    e('textarea',{value:entry,onInput:ev=>setEntry(ev.target.value),placeholder:'How did today session feel?',rows:4,style:{width:'100%',borderRadius:16,padding:12,fontSize:14,background:'#ffffffcc',color:C.ink,border:'1px solid rgba(0,0,0,0.07)',resize:'none'}}),
    e('button',{onClick:save,disabled:!entry.trim(),style:{marginTop:12,background:C.sageDeep,color:'white',border:'none',borderRadius:9999,padding:10,fontSize:14,fontWeight:600,cursor:'pointer',width:'100%',opacity:entry.trim()?1:0.6}},saved?'✓ Saved!':'Save entry'),
    entries.length>0&&e('div',{style:{marginTop:16}},
      e('p',{style:{fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:C.bordeaux,marginBottom:8}},'Past entries'),
      e('div',{style:{display:'flex',flexDirection:'column',gap:8,maxHeight:160,overflowY:'auto'}},
        ...entries.map((en,i)=>e('div',{key:i,style:{background:'#ffffffcc',borderRadius:12,padding:12,display:'flex',gap:8,alignItems:'flex-start'}},
          e('div',{style:{flex:1}},
            e('p',{style:{fontSize:10,color:C.sageDeep,marginBottom:2}},fmt(en.date)),
            e('p',{style:{fontSize:12,color:C.ink}},en.text)
          ),
          e('button',{onClick:()=>{const u=entries.filter((_,j)=>j!==i);setEntries(u);try{localStorage.setItem('aurinne-journal',JSON.stringify(u));}catch(er){}},style:{background:'none',border:'none',cursor:'pointer',color:C.sub,fontSize:12}},'✕')
        ))
      )
    )
  );
}

      ...PHASES.map((ph,i)=>e('button',{key:ph.name,onClick:()=>setActive(i),style:{flex:1,borderRadius:16,padding:'8px 4px',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:active===i?C.bordeaux:'#ffffffcc'}},
        e('span',{style:{fontSize:18}},ph.emoji),
        e('span',{style:{fontSize:10,fontWeight:600,color:active===i?'white':C.ink}},ph.name)
      ))
    ),
    e('div',{style:{background:p.color,borderRadius:16,padding:16}},
      e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
        e('p',{className:'font-display',style:{fontSize:16,color:C.ink}},`${p.name} phase`),
        e('span',{style:{fontSize:11,color:C.sageDeep}},p.days)
      ),
      e('p',{style:{fontSize:12,color:C.ink,marginBottom:8}},e('strong',null,'Hormones: '),p.hormone),
      e('p',{style:{fontSize:12,color:C.ink,marginBottom:8}},e('strong',null,'Energy: '),p.energy),
      e('p',{style:{fontSize:12,color:C.ink}},e('strong',null,'On the reformer: '),p.move)
    ),
    e('p',{style:{fontSize:11,color:C.sub,marginTop:12,lineHeight:1.5}},'General wellness information, not medical advice.')
  );
}

  'Your body listens to how you speak to it.',

  'Consistency is its own kind of grace.',
  'Trust the process, honour the pause.',
];

function MotivationCards(){
  const [idx,setIdx]=useState(0);

  return e('div',{style:{borderRadius:24,padding:20,background:C.blush}},
    e('p',{style:{fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:C.rose,marginBottom:12}},'Daily motivation'),
    e('div',{style:{background:'#ffffffcc',borderRadius:16,padding:24,textAlign:'center',minHeight:96,display:'flex',alignItems:'center',justifyContent:'center'}},
      e('p',{className:'font-display',style:{fontSize:18,fontStyle:'italic',color:C.ink,lineHeight:1.4}},`"${QUOTES[idx]}"`)
    ),
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}},
      e('button',{onClick:()=>setIdx(i=>(i-1+n)%n),style:{width:36,height:36,borderRadius:'50%',background:'#ffffffaa',border:'none',cursor:'pointer',fontSize:18}},'‹'),
      e('div',{style:{display:'flex',gap:6}},

      e('button',{onClick:()=>setIdx(i=>(i+1)%n),style:{width:36,height:36,borderRadius:'50%',background:'#ffffffaa',border:'none',cursor:'pointer',fontSize:18}},'›')
    )
  );
}

function Reformer(){
  return e('div',{style:{flex:1,overflowY:'auto'}},
    e('div',{style:{padding:'20px 24px 16px'}},
      e('p',{style:{fontSize:11,letterSpacing:'0.25em',textTransform:'uppercase',color:C.rose}},'Move · Reformer'),
      e('h1',{className:'font-display',style:{fontSize:28,color:C.ink,marginTop:4}},'On the Carriage')

    e('div',{style:{padding:'0 20px 24px',display:'flex',flexDirection:'column',gap:16}},
      e(Journal),
      e(CycleGuide),
      e(MotivationCards)
    )
  );
}

        e('div',{style:{display:'flex',alignItems:'center',gap:8}},

          e('span',{className:'font-display',style:{fontSize:16,color:C.ink}},'Aurinne')

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
