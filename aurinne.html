const MEDITATION_SECONDS = 5 * 60;

function formatTime(totalSeconds) {
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${m}:${s.toString().padStart(2, "0")}`;
}

function MeditationTimer({ onComplete }) {
  const [secondsLeft, setSecondsLeft] = useState(MEDITATION_SECONDS);
  const [isRunning, setIsRunning] = useState(false);
  const [soundOn, setSoundOn] = useState(true);
  const synthRef = useRef(null);
  const reverbRef = useRef(null);
  const loopRef = useRef(null);

  const startSound = async () => {
    await Tone.start();

    reverbRef.current = new Tone.Reverb({ decay: 6, wet: 0.8 }).toDestination();

    synthRef.current = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "sine" },
      envelope: { attack: 2, decay: 1, sustain: 0.6, release: 4 },
      volume: -18,
    }).connect(reverbRef.current);

    // Gentle bowl-like tones in C major pentatonic
    const notes = ["C4", "E4", "G4", "A4", "C5"];
    let i = 0;
    loopRef.current = new Tone.Loop((time) => {
      synthRef.current.triggerAttackRelease(notes[i % notes.length], "2n", time);
      i++;
    }, "2n");

    Tone.getTransport().bpm.value = 40;
    loopRef.current.start(0);
    Tone.getTransport().start();
  };

  const stopSound = () => {
    loopRef.current?.stop();
    Tone.getTransport().stop();
    synthRef.current?.releaseAll();
  };

  useEffect(() => {
    if (isRunning && soundOn) {
      startSound();
    } else {
      stopSound();
    }
    return () => stopSound();
  }, [isRunning, soundOn]);

  useEffect(() => {
    if (!isRunning) return;
    if (secondsLeft <= 0) {
      setIsRunning(false);
      stopSound();
      onComplete();
      return;
    }
    const id = setTimeout(() => setSecondsLeft((s) => s - 1), 1000);
    return () => clearTimeout(id);
  }, [isRunning, secondsLeft]);

  const toggle = () => {
    if (secondsLeft === 0) return;
    setIsRunning((r) => !r);
  };

  const reset = () => {
    setIsRunning(false);
    stopSound();
    setSecondsLeft(MEDITATION_SECONDS);
  };

  const toggleSound = () => setSoundOn((s) => !s);

  const radius = 64;
  const circumference = 2 * Math.PI * radius;
  const progress = secondsLeft / MEDITATION_SECONDS;
  const offset = circumference * (1 - progress);

  return (
    <div className="rounded-3xl p-5" style={{ backgroundColor: "#FBEDEE" }}>
      <div className="flex items-center justify-between mb-0.5">
        <p className="text-[10px] tracking-[0.2em] uppercase" style={{ color: tokens.rose }}>
          Restore · Wellness
        </p>
        <button
          onClick={toggleSound}
          aria-label={soundOn ? "Mute sound" : "Enable sound"}
          className="flex items-center gap-1 rounded-full px-2.5 py-1 text-[11px] font-medium"
          style={{ backgroundColor: soundOn ? tokens.bordeaux : "#ffffffaa", color: soundOn ? tokens.paper : tokens.sub }}
        >
          {soundOn ? <Volume2 size={12} /> : <VolumeX size={12} />}
          {soundOn ? "Sound on" : "Sound off"}
        </button>
      </div>

      <h2 className="font-display text-lg" style={{ color: tokens.ink }}>
        5-Minute Guided Meditation
      </h2>
      <p className="text-xs mt-1 mb-4" style={{ color: tokens.sub }}>
        Find a comfortable seat. Soften your shoulders. Let your breath lead the way.
      </p>

      <div className="flex items-center justify-center my-2">
        <div className="relative" style={{ width: 160, height: 160 }}>
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle cx="80" cy="80" r={radius} fill="none" stroke="#ffffffaa" strokeWidth="8" />
            <circle
              cx="80" cy="80" r={radius}
              fill="none"
              stroke={tokens.bordeaux}
              strokeWidth="8"
              strokeLinecap="round"
              strokeDasharray={circumference}
              strokeDashoffset={offset}
              transform="rotate(-90 80 80)"
              style={{ transition: "stroke-dashoffset 1s linear" }}
            />
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <span className="font-display text-3xl" style={{ color: tokens.ink }}>
              {formatTime(secondsLeft)}
            </span>
            {isRunning && soundOn && (
              <span className="text-[10px] mt-1 tracking-widest" style={{ color: tokens.rose }}>
                ♪ playing
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="flex items-center justify-center gap-3 mt-3">
        <button
          onClick={reset}
          aria-label="Reset timer"
          className="flex items-center justify-center rounded-full"
          style={{ width: 44, height: 44, backgroundColor: "#ffffffaa", color: tokens.ink }}
        >
          <RotateCcw size={18} />
        </button>
        <button
          onClick={toggle}
          aria-label={isRunning ? "Pause" : "Start"}
          className="flex items-center justify-center rounded-full"
          style={{ width: 56, height: 56, backgroundColor: tokens.bordeaux, color: tokens.paper }}
        >
          {isRunning ? <Pause size={22} /> : <Play size={22} />}
        </button>
        <div style={{ width: 44, height: 44 }} />
      </div>

      {secondsLeft === 0 && (
        <p className="text-center text-sm mt-4 font-medium" style={{ color: tokens.bordeaux }}>
          Beautifully done. Take a slow breath before you go.
        </p>
      )}
    </div>
  );
}

function AIJournal() {
  const [entry, setEntry] = useState("");
  const [reflection, setReflection] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [pastEntries, setPastEntries] = useState([]);
  const [saved, setSaved] = useState(false);
  const [historyLoading, setHistoryLoading] = useState(true);

  // Load past entries on mount
  useEffect(() => {
    const loadEntries = async () => {
      try {
        if (window.storage && typeof window.storage.get === "function") {
          const result = await window.storage.get("journal-entries");
          if (result && result.value) {
            const parsed = JSON.parse(result.value);
            setPastEntries(Array.isArray(parsed) ? parsed : []);
          }
        }
      } catch (e) {
        // No entries yet, or storage unavailable — that's fine
      } finally {
        setHistoryLoading(false);
      }
    };
    loadEntries();
  }, []);

  const saveEntry = async () => {
    const text = entry.trim();
    if (!text) return;

    const newEntry = {
      text,
      date: new Date().toISOString(),
    };
    const updated = [newEntry, ...pastEntries].slice(0, 50);

    // Update UI immediately (in-memory) regardless of persistence outcome
    setPastEntries(updated);
    setEntry("");
    setReflection("");
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);

    // Try to persist; silently ignore if storage isn't available in this environment
    try {
      if (window.storage && typeof window.storage.set === "function") {
        await window.storage.set("journal-entries", JSON.stringify(updated));
      }
    } catch (e) {
      // Storage not available here — entry still kept in memory for this session
    }
  };

  const deleteEntry = async (index) => {
    const updated = pastEntries.filter((_, i) => i !== index);
    setPastEntries(updated);
    try {
      if (window.storage && typeof window.storage.set === "function") {
        await window.storage.set("journal-entries", JSON.stringify(updated));
      }
    } catch (e) {
      // Storage not available here
    }
  };

  const reflect = async () => {
    const text = entry.trim();
    if (!text) return;
    setLoading(true);
    setError("");
    setReflection("");

    const prompt = `You're a warm, encouraging journaling companion inside a Pilates and wellness app called Aurinne. A member just wrote this journal entry:

"""
${text}
"""

Write a short reflection (3-4 sentences max) in a calm, warm, non-clinical tone. Acknowledge what they shared, gently notice any patterns or strengths, and end with one small encouraging thought or gentle question. Do not give medical advice. Do not use bullet points or headings.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await response.json();
      const textBlocks = (data.content || [])
        .filter((b) => b.type === "text")
        .map((b) => b.text)
        .join("\n");
      setReflection(textBlocks || "I couldn't quite form a reflection this time — try again in a moment.");
    } catch (e) {
      setError("Something went wrong reaching your AI companion. Please try again.");
    } finally {
      setLoading(false);
    }
  };

  const formatDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { day: "numeric", month: "short" }) +
      " · " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  };

  return (
    <div className="rounded-3xl p-5" style={{ backgroundColor: "#F6E3DF" }}>
      <p className="text-[10px] tracking-[0.2em] uppercase mb-0.5" style={{ color: tokens.bordeaux }}>
        Move · Reformer
      </p>
      <h2 className="font-display text-lg" style={{ color: tokens.ink }}>
        Daily Journal
      </h2>
      <p className="text-xs mt-1 mb-3" style={{ color: tokens.sub }}>
        Write freely about your practice, your body, your day. Your reflections stay here, saved on this device.
      </p>

      <textarea
        value={entry}
        onChange={(e) => setEntry(e.target.value)}
        placeholder="How did today's session feel?"
        rows={4}
        className="w-full rounded-2xl p-3 text-sm outline-none resize-none"
        style={{ backgroundColor: "#ffffffcc", color: tokens.ink, border: "1px solid #00000010" }}
      />

      <div className="flex gap-2 mt-3">
        <button
          onClick={saveEntry}
          disabled={!entry.trim()}
          className="flex items-center justify-center gap-2 rounded-full py-2.5 text-sm font-medium flex-1"
          style={{
            backgroundColor: tokens.sageDeep,
            color: tokens.paper,
            opacity: !entry.trim() ? 0.6 : 1,
          }}
        >
          {saved ? "✓ Saved" : "Save entry"}
        </button>
        <button
          onClick={reflect}
          disabled={loading || !entry.trim()}
          className="flex items-center justify-center gap-2 rounded-full py-2.5 text-sm font-medium flex-1"
          style={{
            backgroundColor: tokens.bordeaux,
            color: tokens.paper,
            opacity: loading || !entry.trim() ? 0.6 : 1,
          }}
        >
          {loading ? <Loader2 size={15} className="animate-spin" /> : <Sparkles size={15} />}
          {loading ? "Reflecting…" : "Reflect with AI"}
        </button>
      </div>

      {error && (
        <p className="text-xs mt-3" style={{ color: tokens.bordeaux }}>
          {error}
        </p>
      )}

      {reflection && (
        <div className="mt-3 rounded-2xl p-3.5" style={{ backgroundColor: "#ffffffcc" }}>
          <p className="text-[10px] tracking-[0.2em] uppercase mb-1" style={{ color: tokens.bordeaux }}>
            Aurinne AI
          </p>
          <p className="text-sm leading-relaxed" style={{ color: tokens.ink }}>
            {reflection}
          </p>
        </div>
      )}

      {/* Past entries */}
      {!historyLoading && pastEntries.length > 0 && (
        <div className="mt-4">
          <p className="text-[10px] tracking-[0.2em] uppercase mb-2" style={{ color: tokens.bordeaux }}>
            Past entries
          </p>
          <div className="flex flex-col gap-2 max-h-48 overflow-y-auto">
            {pastEntries.map((e, i) => (
              <div
                key={i}
                className="rounded-2xl p-3 flex items-start justify-between gap-2"
                style={{ backgroundColor: "#ffffffcc" }}
              >
                <div className="flex-1">
                  <p className="text-[10px] mb-0.5" style={{ color: tokens.sageDeep }}>
                    {formatDate(e.date)}
                  </p>
                  <p className="text-xs leading-snug" style={{ color: tokens.ink }}>
                    {e.text}
                  </p>
                </div>
                <button
                  onClick={() => deleteEntry(i)}
                  aria-label="Delete entry"
                  className="text-xs shrink-0"
                  style={{ color: tokens.sub }}
                >
                  ✕
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}
