// ── Wellness ───────────────────────────────────────────────────────────
function MeditationTimer(){
  const [secs,setSecs]=useState(300);
  const [running,setRunning]=useState(false);
  const [soundOn,setSoundOn]=useState(true);
  const synthRef=useRef(null);
  const loopRef=useRef(null);

  const startSound=async()=>{
    await Tone.start();
    const rev=new Tone.Reverb({decay:6,wet:0.8}).toDestination();
    synthRef.current=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},envelope:{attack:2,decay:1,sustain:0.6,release:4},volume:-18}).connect(rev);
    const notes=['C4','E4','G4','A4','C5'];let i=0;
    loopRef.current=new Tone.Loop(t=>{synthRef.current.triggerAttackRelease(notes[i++%notes.length],'2n',t)},'2n');
    Tone.getTransport().bpm.value=40;loopRef.current.start(0);Tone.getTransport().start();
  };
  const stopSound=()=>{loopRef.current?.stop();Tone.getTransport().stop();synthRef.current?.releaseAll()};

  useEffect(()=>{if(running&&soundOn)startSound();else stopSound();return stopSound},[running,soundOn]);
  useEffect(()=>{
    if(!running)return;
    if(secs<=0){setRunning(false);stopSound();return}
    const id=setTimeout(()=>setSecs(s=>s-1),1000);return()=>clearTimeout(id);
  },[running,secs]);

  const r=64,circ=2*Math.PI*r,offset=circ*(1-secs/300);
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  return html`<div class="card" style="background:#FBEDEE">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <p style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:${C.rose}">Restore · Wellness</p>
      <button onClick=${()=>setSoundOn(s=>!s)} style="background:${soundOn?C.bordeaux:'#ffffffaa'};color:${soundOn?'white':C.sub};border:none;border-radius:9999px;padding:4px 10px;font-size:11px;cursor:pointer">
        ${soundOn?'🔊 Sound on':'🔇 Sound off'}
      </button>
    </div>
    <h2 class="font-display" style="font-size:18px;color:${C.ink}">5-Minute Guided Meditation</h2>
    <p style="font-size:12px;color:${C.sub};margin:4px 0 16px">Find a comfortable seat. Soften your shoulders. Let your breath lead.</p>
    <div style="display:flex;justify-content:center;margin:8px 0">
      <div style="position:relative;width:160px;height:160px">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r=${r} fill="none" stroke="#ffffffaa" stroke-width="8"/>
          <circle cx="80" cy="80" r=${r} fill="none" stroke=${C.bordeaux} stroke-width="8" stroke-linecap="round"
            stroke-dasharray=${circ} stroke-dashoffset=${offset} transform="rotate(-90 80 80)" style="transition:stroke-dashoffset 1s linear"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <span class="font-display" style="font-size:28px;color:${C.ink}">${fmt(secs)}</span>
          ${running&&soundOn&&html`<span style="font-size:10px;color:${C.rose};letter-spacing:0.2em">♪ playing</span>`}
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:center;gap:12px;margin-top:12px">
      <button onClick=${()=>{setRunning(false);stopSound();setSecs(300)}} style="width:44px;height:44px;border-radius:50%;background:#ffffffaa;border:none;cursor:pointer;font-size:18px">↺</button>
      <button onClick=${()=>secs>0&&setRunning(r=>!r)} style="width:56px;height:56px;border-radius:50%;background:${C.bordeaux};color:white;border:none;cursor:pointer;font-size:22px">${running?'⏸':'▶'}</button>
      <div style="width:44px"/>
    </div>
    ${secs===0&&html`<p style="text-align:center;font-size:14px;font-weight:600;color:${C.bordeaux};margin-top:16px">Beautifully done. Take a slow breath before you go.</p>`}
  </div>`;
}

function YogaFlow(){
  const [done,setDone]=useState(Array(POSES.length).fill(false));

  return html`<div class="card" style="background:#F1ECE0">

    <p style="font-size:12px;color:${C.sub};margin:4px 0 16px">${count} of ${POSES.length} done · tap a pose to preview</p>
    ${active!==null&&html`<div style="background:${POSES[active].color};border-radius:16px;padding:20px;margin-bottom:12px;text-align:center">
      <div style="font-size:64px;margin-bottom:8px">${POSES[active].emoji}</div>

      </div>

    <div style="display:flex;flex-direction:column;gap:8px">
      ${POSES.map((p,i)=>html`<button key=${p.name} class="pose-btn" onClick=${()=>setActive(active===i?null:i)}
        style="background:${done[i]?'#DCE3D0':active===i?p.color:'#ffffffcc'};opacity:${done[i]?0.65:1}">
        <div style="width:54px;height:54px;border-radius:12px;background:${done[i]?'#ffffffaa':p.color};font-size:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0">

            <p style="font-size:14px;font-weight:600;color:${C.ink};text-decoration:${done[i]?'line-through':'none'}">${p.name}</p>

          </div>
          <p style="font-size:12px;color:${C.sub};margin-top:2px">${p.cue}</p>
        </div>
      </button>`)}
    </div>
  </div>`;
}

  {name:'Luteal',days:'Days 17–28',hormone:'Progesterone rises, then both hormones drop before your period.',energy:'Energy may dip — some notice more tiredness or sensitivity.',move:'Moderate reformer work earlier, shifting to gentler movement as your period nears.',color:'#EFE7DC',emoji:'🍂'},
];

function Journal(){
  const [entry,setEntry]=useState('');
  const [entries,setEntries]=useState([]);
  const [saved,setSaved]=useState(false);

  useEffect(()=>{
    try{const s=localStorage.getItem('aurinne-journal');if(s)setEntries(JSON.parse(s));}catch(e){}
  },[]);

  const save=()=>{
    if(!entry.trim())return;
    const updated=[{text:entry.trim(),date:new Date().toISOString()},...entries].slice(0,50);
    setEntries(updated);
    try{localStorage.setItem('aurinne-journal',JSON.stringify(updated));}catch(e){}
    setEntry('');setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const fmt=iso=>{const d=new Date(iso);return d.toLocaleDateString(undefined,{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})};

  return html`<div class="card" style="background:#F6E3DF">
    <p style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:${C.bordeaux}">Move · Reformer</p>
    <h2 class="font-display" style="font-size:18px;color:${C.ink}">Daily Journal</h2>
    <p style="font-size:12px;color:${C.sub};margin:4px 0 12px">Write freely about your practice, your body, your day.</p>
    <textarea value=${entry} onInput=${e=>setEntry(e.target.value)} placeholder="How did today's session feel?" rows="4"
      style="width:100%;border-radius:16px;padding:12px;font-size:14px;background:#ffffffcc;color:${C.ink};border:1px solid rgba(0,0,0,0.07);resize:none"></textarea>
    <button onClick=${save} disabled=${!entry.trim()} style="margin-top:12px;background:${C.sageDeep};color:white;border:none;border-radius:9999px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%;opacity:${entry.trim()?1:0.6}">
      ${saved?'✓ Saved!':'Save entry'}
    </button>
    ${entries.length>0&&html`<div style="margin-top:16px">
      <p style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:${C.bordeaux};margin-bottom:8px">Past entries</p>
      <div style="display:flex;flex-direction:column;gap:8px;max-height:160px;overflow-y:auto">
        ${entries.map((e,i)=>html`<div key=${i} style="background:#ffffffcc;border-radius:12px;padding:12px;display:flex;gap:8px;align-items:flex-start">
          <div style="flex:1">
            <p style="font-size:10px;color:${C.sageDeep};margin-bottom:2px">${fmt(e.date)}</p>
            <p style="font-size:12px;color:${C.ink}">${e.text}</p>
          </div>
          <button onClick=${()=>{const u=entries.filter((_,j)=>j!==i);setEntries(u);try{localStorage.setItem('aurinne-journal',JSON.stringify(u));}catch(err){}}}
            style="background:none;border:none;cursor:pointer;color:${C.sub};font-size:12px">✕</button>
        </div>`)}
      </div>
    </div>`}
  </div>`;
}

function CycleGuide(){
  const [active,setActive]=useState(0);
  const p=PHASES[active];
  return html`<div class="card" style="background:#F1ECE0">
    <p style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:${C.sageDeep}">Understand · Hormones</p>
    <h2 class="font-display" style="font-size:18px;color:${C.ink}">Cycle & Energy</h2>
    <p style="font-size:12px;color:${C.sub};margin:4px 0 16px">A gentle guide to how your hormones may shape your energy through the month.</p>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      ${PHASES.map((ph,i)=>html`<button key=${ph.name} class="phase-btn" onClick=${()=>setActive(i)}
        style="background:${active===i?C.bordeaux:'#ffffffcc'}">
        <span style="font-size:18px">${ph.emoji}</span>
        <span style="font-size:10px;font-weight:600;color:${active===i?'white':C.ink}">${ph.name}</span>
      </button>`)}
    </div>
    <div style="background:${p.color};border-radius:16px;padding:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <p class="font-display" style="font-size:16px;color:${C.ink}">${p.name} phase</p>
        <span style="font-size:11px;color:${C.sageDeep}">${p.days}</span>
      </div>
      <p style="font-size:12px;color:${C.ink};margin-bottom:8px"><strong>Hormones: </strong>${p.hormone}</p>
      <p style="font-size:12px;color:${C.ink};margin-bottom:8px"><strong>Energy: </strong>${p.energy}</p>
      <p style="font-size:12px;color:${C.ink}"><strong>On the reformer: </strong>${p.move}</p>
    </div>
    <p style="font-size:11px;color:${C.sub};margin-top:12px;line-height:1.5">General wellness information, not medical advice. If you have concerns about your hormones, please speak with a doctor.</p>
  </div>`;
}

function MotivationCards(){
  const [idx,setIdx]=useState(0);
  const n=QUOTES.length;
  return html`<div class="card" style="background:${C.blush}">
    <p style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:${C.rose};margin-bottom:12px">Daily motivation</p>
    <div style="background:#ffffffcc;border-radius:16px;padding:24px;text-align:center;min-height:96px;display:flex;align-items:center;justify-content:center">
      <p class="font-display" style="font-size:18px;font-style:italic;color:${C.ink};line-height:1.4">"${QUOTES[idx]}"</p>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <button class="motivation-btn" onClick=${()=>setIdx(i=>(i-1+n)%n)} style="background:#ffffffaa">‹</button>
      <div style="display:flex;gap:6px">
        ${QUOTES.map((_,i)=>html`<span key=${i} style="width:6px;height:6px;border-radius:50%;background:${i===idx?C.rose:'rgba(255,255,255,0.5)'};display:inline-block"></span>`)}
      </div>
      <button class="motivation-btn" onClick=${()=>setIdx(i=>(i+1)%n)} style="background:#ffffffaa">›</button>
    </div>
  </div>`;
}

function Reformer(){
  return html`<div style="flex:1;overflow-y:auto">
    <div style="padding:20px 24px 16px">
      <p style="font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:${C.rose}">Move · Reformer</p>
      <h1 class="font-display" style="font-size:28px;color:${C.ink};margin-top:4px">On the Carriage</h1>
    </div>
    <div style="padding:0 20px 24px;display:flex;flex-direction:column;gap:16px">
      <${Journal}/>
      <${CycleGuide}/>
      <${MotivationCards}/>
    </div>
  </div>`;
}

      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 24px 8px">
        <span style="font-size:12px;font-weight:600;color:${C.ink}">10:41</span>
        <div style="display:flex;align-items:center;gap:8px">
          <${Logo} size=${26}/>
          <span class="font-display" style="font-size:16px;color:${C.ink}">Aurinne</span>
        </div>
      </div>

      <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">

        ${tab==='reformer'&&html`<${Reformer}/>`}
      </div>

      <div style="border-top:1px solid rgba(0,0,0,0.06);background:${C.paper}">
        <div style="display:flex;justify-content:space-around;padding:12px 0">
          ${TABS.map(t=>html`<button key=${t.key} class="tab-btn" onClick=${()=>setTab(t.key)}>

            <span style="font-size:10px;color:${tab===t.key?t.accent:'#C9BFB3'};font-weight:${tab===t.key?600:400}">${t.label}</span>

          </svg>
          <a href="https://www.instagram.com/aurinne2026" target="_blank" style="font-size:11px;color:#C9BFB3;text-decoration:none">@aurinne2026</a>

render(h(App,null), document.getElementById('app'));
</script>
